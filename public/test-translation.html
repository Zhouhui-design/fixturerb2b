<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .result.success {
            border-left-color: #10b981;
        }
        
        .result.error {
            border-left-color: #ef4444;
        }
        
        .result-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .result-text {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }
        
        .result-meta {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .provider-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Translation API Test</h1>
        <p class="subtitle">Test the real-time translation service with multiple providers</p>
        
        <div class="test-section">
            <h2>Translation Test</h2>
            
            <div class="input-group">
                <label for="sourceText">Source Text:</label>
                <textarea id="sourceText" placeholder="Enter text to translate...">Hello! How are you today? I hope you're having a wonderful day.</textarea>
            </div>
            
            <div class="input-group">
                <label for="sourceLang">Source Language:</label>
                <select id="sourceLang">
                    <option value="auto">Auto Detect</option>
                    <option value="en" selected>English</option>
                    <option value="zh">Chinese (中文)</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="ja">Japanese (日本語)</option>
                    <option value="ko">Korean (한국어)</option>
                    <option value="ar">Arabic (العربية)</option>
                    <option value="ru">Russian (Русский)</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="targetLang">Target Language:</label>
                <select id="targetLang">
                    <option value="en">English</option>
                    <option value="zh" selected>Chinese (中文)</option>
                    <option value="es">Spanish (Español)</option>
                    <option value="fr">French (Français)</option>
                    <option value="de">German (Deutsch)</option>
                    <option value="ja">Japanese (日本語)</option>
                    <option value="ko">Korean (한국어)</option>
                    <option value="ar">Arabic (العربية)</option>
                    <option value="ru">Russian (Русский)</option>
                </select>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" id="translateBtn" onclick="testTranslation()">
                    Translate
                </button>
                <button class="btn-secondary" onclick="clearResults()">Clear</button>
            </div>
            
            <div id="result"></div>
        </div>
        
        <div class="test-section">
            <h2>API Statistics</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalRequests">0</div>
                    <div class="stat-label">Total Requests</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="successCount">0</div>
                    <div class="stat-label">Successful</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="failCount">0</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgTime">0ms</div>
                    <div class="stat-label">Avg Response Time</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let stats = {
            total: 0,
            success: 0,
            fail: 0,
            totalTime: 0
        };
        
        async function testTranslation() {
            const sourceText = document.getElementById('sourceText').value;
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const resultDiv = document.getElementById('result');
            const translateBtn = document.getElementById('translateBtn');
            
            if (!sourceText.trim()) {
                alert('Please enter some text to translate');
                return;
            }
            
            // Show loading state
            translateBtn.disabled = true;
            translateBtn.innerHTML = '<span class="loading"></span> Translating...';
            resultDiv.innerHTML = '';
            
            const startTime = Date.now();
            
            try {
                // Use MyMemory API directly for testing
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(sourceText)}&langpair=${sourceLang}|${targetLang}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                // Update stats
                stats.total++;
                stats.totalTime += duration;
                
                if (data.responseStatus === 200) {
                    stats.success++;
                    
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <div class="result-label">✓ Translation Successful</div>
                            <div class="result-text">${data.responseData.translatedText}</div>
                            <div class="result-meta">
                                <span class="provider-badge">MyMemory</span>
                                ${data.responseData.detectedLanguage ? `<span style="margin-left: 10px;">Detected: ${data.responseData.detectedLanguage}</span>` : ''}
                                <br><br>
                                Response time: ${duration}ms
                            </div>
                        </div>
                    `;
                } else {
                    throw new Error(data.responseDetails || 'Translation failed');
                }
            } catch (error) {
                stats.fail++;
                const endTime = Date.now();
                const duration = endTime - startTime;
                
                resultDiv.innerHTML = `
                    <div class="result error">
                        <div class="result-label">✗ Translation Failed</div>
                        <div class="result-text" style="color: #ef4444;">${error.message}</div>
                        <div class="result-meta">
                            Response time: ${duration}ms<br>
                            <small>Falling back to mock translation...</small>
                        </div>
                    </div>
                `;
                
                // Fallback to mock
                setTimeout(() => {
                    const langNames = {
                        'en': 'English',
                        'zh': '中文',
                        'es': 'Español',
                        'fr': 'Français',
                        'de': 'Deutsch',
                        'ja': '日本語',
                        'ko': '한국어',
                        'ar': 'العربية',
                        'ru': 'Русский'
                    };
                    
                    const fallbackResult = document.createElement('div');
                    fallbackResult.className = 'result';
                    fallbackResult.style.marginTop = '10px';
                    fallbackResult.innerHTML = `
                        <div class="result-label">Mock Translation (Fallback)</div>
                        <div class="result-text">[${langNames[targetLang] || targetLang}] ${sourceText}</div>
                        <div class="result-meta">This is a simulated translation for demonstration purposes</div>
                    `;
                    resultDiv.appendChild(fallbackResult);
                }, 500);
            } finally {
                translateBtn.disabled = false;
                translateBtn.innerHTML = 'Translate';
                updateStats();
            }
        }
        
        function clearResults() {
            document.getElementById('result').innerHTML = '';
            document.getElementById('sourceText').value = '';
        }
        
        function updateStats() {
            document.getElementById('totalRequests').textContent = stats.total;
            document.getElementById('successCount').textContent = stats.success;
            document.getElementById('failCount').textContent = stats.fail;
            document.getElementById('avgTime').textContent = 
                stats.total > 0 ? `${Math.round(stats.totalTime / stats.total)}ms` : '0ms';
        }
        
        // Auto-translate on page load for demo
        window.addEventListener('load', () => {
            setTimeout(() => {
                testTranslation();
            }, 500);
        });
    </script>
</body>
</html>
