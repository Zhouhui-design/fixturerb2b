<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Requests Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover { background: #5568d3; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.loading { background: #fff3cd; color: #856404; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        tr:hover { background: #f8f9fa; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-reviewed { background: #cce5ff; color: #004085; }
        .badge-quoted { background: #d4edda; color: #155724; }
        .badge-converted { background: #d1ecf1; color: #0c5460; }
        .badge-lost { background: #f8d7da; color: #721c24; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        .refresh-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Quote Requests Manager</h1>
            <p>Monitor and manage customer inquiries</p>
        </div>
        
        <div class="controls">
            <button id="refreshBtn" onclick="loadQuotes()">
                🔄 Refresh
            </button>
            <div id="status"></div>
            <div class="refresh-indicator">
                <span>Last updated:</span>
                <span id="lastUpdate">Never</span>
            </div>
        </div>
        
        <div id="content">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h3>No quote requests yet</h3>
                <p>Click "Refresh" to check for new inquiries</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration - Update these values
        const SUPABASE_URL = 'https://yaumblbimxrunltqadsq.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_bz-UdtzBNgA_ckTh--Hrig_bbSh8prW';
        
        let autoRefreshInterval = null;

        async function loadQuotes() {
            const refreshBtn = document.getElementById('refreshBtn');
            const statusDiv = document.getElementById('status');
            const contentDiv = document.getElementById('content');
            
            refreshBtn.disabled = true;
            statusDiv.innerHTML = '<span class="status loading">⏳ Loading...</span>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/quote_requests?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const quotes = await response.json();
                
                if (quotes.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <h3>No quote requests yet</h3>
                            <p>New inquiries will appear here</p>
                        </div>
                    `;
                } else {
                    renderQuotes(quotes);
                }
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                statusDiv.innerHTML = `<span class="status success">✅ Loaded ${quotes.length} request(s)</span>`;
                
            } catch (error) {
                console.error('Error loading quotes:', error);
                statusDiv.innerHTML = `<span class="status error">❌ Error: ${error.message}</span>`;
            } finally {
                refreshBtn.disabled = false;
            }
        }
        
        function renderQuotes(quotes) {
            const contentDiv = document.getElementById('content');
            
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Company</th>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${quotes.map(quote => `
                            <tr>
                                <td>${new Date(quote.created_at).toLocaleDateString()}</td>
                                <td>
                                    <strong>${quote.customer_name}</strong><br>
                                    <small style="color: #666;">${quote.customer_email}</small>
                                </td>
                                <td>${quote.company_name}</td>
                                <td>${quote.product_name}</td>
                                <td>${quote.quantity}</td>
                                <td><span class="badge badge-${quote.status}">${quote.status}</span></td>
                                <td>
                                    <a href="https://app.supabase.com/project/yaumblbimxrunltqadsq/editor?table=quote_requests" 
                                       target="_blank" 
                                       style="color: #667eea; text-decoration: none; font-weight: 600;">
                                        View Details →
                                    </a>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            contentDiv.innerHTML = html;
        }
        
        // Auto-refresh every 5 minutes
        function startAutoRefresh() {
            autoRefreshInterval = setInterval(loadQuotes, 5 * 60 * 1000);
        }
        
        // Load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadQuotes();
            startAutoRefresh();
        });
    </script>
</body>
</html>
