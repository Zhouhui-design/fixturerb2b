<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 连接测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        .section { margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 16px; margin-top: 10px; }
        .result { margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 6px; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
        .result.error { background: #ffebee; color: #c62828; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h1> API 连接测试</h1>
        
        <div class="section">
            <h2>测试 1: 服务器连接</h2>
            <button onclick="testConnection()">测试连接</button>
            <div id="test1-result"></div>
        </div>
        
        <div class="section">
            <h2>测试 2: 注册并获取 isAdmin</h2>
            <input type="text" id="username" placeholder="输入测试用户名">
            <button onclick="testRegister()">测试注册</button>
            <div id="test2-result"></div>
        </div>
        
        <div class="section">
            <h2>测试 3: 获取管理员信息</h2>
            <button onclick="testGetAdmin()">获取管理员</button>
            <div id="test3-result"></div>
        </div>
    </div>
    
    <script>
        async function testConnection() {
            const div = document.getElementById('test1-result');
            div.innerHTML = '测试中...';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'test-' + Date.now(), tenantId: 'fixturerb2b' })
                });
                const data = await res.json();
                div.innerHTML = res.ok ? 
                    `✅ 成功!\n状态: ${res.status}\n数据: ${JSON.stringify(data, null, 2)}` :
                    `❌ 失败!\n状态: ${res.status}\n错误: ${data.error}`;
                div.className = res.ok ? 'result' : 'result error';
            } catch (e) {
                div.innerHTML = `❌ 网络错误\n${e.message}`;
                div.className = 'result error';
            }
        }
        
        async function testRegister() {
            const username = document.getElementById('username').value.trim();
            if (!username) { alert('请输入用户名'); return; }
            const div = document.getElementById('test2-result');
            div.innerHTML = '注册中...';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, tenantId: 'fixturerb2b' })
                });
                const data = await res.json();
                div.innerHTML = res.ok ?
                    `✅ 注册成功!\n用户名: ${data.username}\nisAdmin: ${data.isAdmin}\nToken: ${data.token.substring(0, 30)}...` :
                    `❌ 失败: ${data.error}`;
                div.className = res.ok ? 'result' : 'result error';
            } catch (e) {
                div.innerHTML = `❌ 网络错误\n${e.message}`;
                div.className = 'result error';
            }
        }
        
        async function testGetAdmin() {
            const div = document.getElementById('test3-result');
            div.innerHTML = '获取中...';
            try {
                const res = await fetch('/api/auth/admin?tenantId=fixturerb2b');
                const data = await res.json();
                div.innerHTML = res.ok ?
                    `✅ 成功!\n管理员: ${data.username}\nID: ${data.userId}` :
                    ` 失败: ${data.error}`;
                div.className = res.ok ? 'result' : 'result error';
            } catch (e) {
                div.innerHTML = `❌ 网络错误\n${e.message}`;
                div.className = 'result error';
            }
        }
    </script>
</body>
</html>
