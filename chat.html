<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary Meta Tags -->
    <title>FixtureRB2B - Online Chat Support</title>
    <meta name="title" content="FixtureRB2B - Live Chat Support" />
    <meta name="description" content="Chat with our customer service team in real-time. Multi-language support with instant translation." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://chat.fixturerb2b.top/" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#d97706" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f5f5f5;
        overflow: hidden;
      }
      #root { height: 100vh; width: 100vw; }
      
      /* Loading screen */
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        z-index: 9999;
        transition: opacity 0.3s;
      }
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #d97706;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        margin-top: 16px;
        color: white;
        font-size: 14px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading Screen -->
      <div class="loading-screen" id="loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading Chat System...</p>
      </div>
    </div>
    <script type="module" src="/src/main-chat.tsx"></script>
  </body>
</html>
