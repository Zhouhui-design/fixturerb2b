# 优化的 Nginx 配置 - fixr2026.com
# 解决 TTFB 慢的问题

server {
    listen 80;
    server_name fixr2026.com www.fixr2026.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;  # 启用 HTTP/2
    server_name fixr2026.com www.fixr2026.com;

    root /var/www/fixr2026.com;
    index index.html;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/fixr2026.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fixr2026.com-0001/privkey.pem;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;  # SSL 会话缓存
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Gzip 压缩优化
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        font/opentype
        image/svg+xml;

    # 浏览器缓存 - 静态资源
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 文件不缓存（确保更新立即生效）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # 主路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/fixr2026.com.access.log;
    error_log /var/log/nginx/fixr2026.com.error.log;
}
